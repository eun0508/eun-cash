<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EUN가계부 3.0</title>
<style>
body{font-family:-apple-system,sans-serif;max-width:1200px;margin:auto;padding:20px}
table{width:100%;border-collapse:collapse;margin-bottom:10px}
th,td{border:1px solid #ddd;padding:6px}
input,select{width:100%;box-sizing:border-box}
button{padding:6px 10px;margin:3px}
.sec{border:1px solid #ddd;padding:12px;border-radius:8px;margin-bottom:12px}
.sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.box{border:1px solid #ddd;padding:10px;border-radius:8px}
</style>
</head>
<body>
<h1>💰 EUN가계부 3.0</h1>

<div class="sec">
월 <input type="month" id="month">
<button onclick="saveMonth()">저장</button>
<button onclick="loadMonth()">불러오기</button>
</div>

<div class="sec">
<h3>수입</h3>
<table id="income"><tr><th>항목</th><th>금액</th><th></th></tr></table>
<button onclick="addIncome()">추가</button>
</div>

<div class="sec">
<h3>고정비</h3>
<table id="fixed"><tr><th>매월</th><th>결제</th><th>카테고리</th><th>상세명</th><th>금액</th><th></th></tr></table>
<button onclick="addFixed()">추가</button>
</div>

<div class="sec">
<h3>투자/저축</h3>
<table id="invest"><tr><th>항목</th><th>금액</th><th></th></tr></table>
<button onclick="addInvest()">추가</button>
</div>

<div class="sec">
<h3>카드 청구액</h3>
<table id="card"><tr><th>카드명</th><th>금액</th><th></th></tr></table>
<button onclick="addCard()">추가</button>
</div>

<div class="sum">
<div class="box">총 수입<br><b id="si">0</b></div>
<div class="box">총 고정비<br><b id="sf">0</b></div>
<div class="box">투자/저축<br><b id="sv">0</b></div>
<div class="box">카드 생활비<br><b id="sl">0</b></div>
<div class="box">남은 돈<br><b id="sr">0</b></div>
</div>

<script>
const cats=['보험','대출','렌탈','반려견','양가부모님','OTT','투자','저축','기타'];

function delRow(b){b.closest('tr').remove();calc();}

function addIncome(a='',b=''){
 let r=document.getElementById('income').insertRow(-1);
 r.innerHTML=`<td><input value="${a}"></td><td><input type="number" value="${b}" oninput="calc()"></td><td><button onclick="delRow(this)">삭제</button></td>`;
}
function addInvest(a='',b=''){
 let r=document.getElementById('invest').insertRow(-1);
 r.innerHTML=`<td><input value="${a}"></td><td><input type="number" value="${b}" oninput="calc()"></td><td><button onclick="delRow(this)">삭제</button></td>`;
}
function addCard(a='',b=''){
 let r=document.getElementById('card').insertRow(-1);
 r.innerHTML=`<td><input value="${a}"></td><td><input type="number" value="${b}" oninput="calc()"></td><td><button onclick="delRow(this)">삭제</button></td>`;
}
function addFixed(m=true,p='현금',c='보험',d='',amt=''){
 let opts=cats.map(x=>`<option ${x==c?'selected':''}>${x}</option>`).join('');
 let r=document.getElementById('fixed').insertRow(-1);
 r.innerHTML=`<td><input type="checkbox" ${m?'checked':''}></td>
 <td><select><option ${p=='현금'?'selected':''}>현금</option><option ${p=='카드'?'selected':''}>카드</option></select></td>
 <td><select>${opts}</select></td>
 <td><input value="${d}"></td>
 <td><input type="number" value="${amt}" oninput="calc()"></td>
 <td><button onclick="delRow(this)">삭제</button></td>`;
}

function calc(){
 let income=0,fixed=0,invest=0,card=0,cardFixed=0;

 [...income.rows].slice(1).forEach(r=>income+=+(r.cells[1].querySelector('input').value||0));
 [...invest.rows].slice(1).forEach(r=>invest+=+(r.cells[1].querySelector('input').value||0));
 [...card.rows].slice(1).forEach(r=>card+=+(r.cells[1].querySelector('input').value||0));

 [...fixed.rows].slice(1).forEach(r=>{
   let a=+(r.cells[4].querySelector('input').value||0);
   fixed+=a;
   if(r.cells[1].querySelector('select').value==='카드') cardFixed+=a;
 });

 let living=card-cardFixed;
 let remain=income-fixed-invest-living;

 si.innerText=income.toLocaleString();
 sf.innerText=fixed.toLocaleString();
 sv.innerText=invest.toLocaleString();
 sl.innerText=living.toLocaleString();
 sr.innerText=remain.toLocaleString();
}

function collect(){
 return {
 income:[...income.rows].slice(1).map(r=>[r.cells[0].querySelector('input').value,r.cells[1].querySelector('input').value]),
 invest:[...invest.rows].slice(1).map(r=>[r.cells[0].querySelector('input').value,r.cells[1].querySelector('input').value]),
 card:[...card.rows].slice(1).map(r=>[r.cells[0].querySelector('input').value,r.cells[1].querySelector('input').value]),
 fixed:[...fixed.rows].slice(1).map(r=>({
 monthly:r.cells[0].querySelector('input').checked,
 pay:r.cells[1].querySelector('select').value,
 cat:r.cells[2].querySelector('select').value,
 detail:r.cells[3].querySelector('input').value,
 amt:r.cells[4].querySelector('input').value
 }))
 };
}

function saveMonth(){
 localStorage.setItem('EUN3_'+month.value,JSON.stringify(collect()));
 alert('저장 완료');
}

function clearT(id){let t=document.getElementById(id);while(t.rows.length>1)t.deleteRow(1);}

function loadMonth(){
 clearT('income');clearT('invest');clearT('card');clearT('fixed');
 let raw=localStorage.getItem('EUN3_'+month.value);
 if(!raw){calc();return;}
 let d=JSON.parse(raw);
 d.income.forEach(x=>addIncome(x[0],x[1]));
 d.invest.forEach(x=>addInvest(x[0],x[1]));
 d.card.forEach(x=>addCard(x[0],x[1]));
 d.fixed.forEach(x=>addFixed(x.monthly,x.pay,x.cat,x.detail,x.amt));
 calc();
}

month.value=new Date().toISOString().slice(0,7);
addIncome('은희 월급','');
addIncome('배우자 월급','');
addCard('삼성카드','');
addCard('현대카드','');
calc();
</script>
</body>
</html>
