<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EUN 월 현금 대시보드</title>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#E3E9F2;
  max-width:1100px;
  margin:auto;
  padding:16px;
  color:#1F2937;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

h2{
  margin-top:28px;
  margin-bottom:10px;
  font-size:20px;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
  border:1px solid #E4EAF2;
}

th{
  background:#639ED5;
  color:white;
  padding:14px;
  border-right:1px solid rgba(255,255,255,0.25);
}

td{
  border-bottom:1px solid #E5EAF3;
  border-right:1px solid #EDF2F8;
  padding:12px;
}

td:last-child{
  border-right:none;
}

tr:last-child td{
  border-bottom:none;
}

input,select{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border:1px solid #dbe2ea;
  border-radius:10px;
  background:white;
}

button{
  border:none;
  border-radius:12px;
  background:#639ED5;
  color:white;
  font-weight:600;
  padding:10px 16px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
}

.panel{
  background:white;
  border-radius:20px;
  padding:18px;
  margin:12px 0;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}

.btn-row button{
  min-width:120px;
  height:44px;
}

.btn-row input[type=file]{
  padding:8px;
  background:white;
}

.box{
  background:white;
  border-radius:18px;
  padding:16px;
  margin:10px 0;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.sum{
  font-size:17px;
  font-weight:700;
}

#month{
  margin-top:8px;
  margin-bottom:10px;
}

.summary-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:12px;
}

.add-btn{
 background:#EFEFEF !important;
 color:#4B5563 !important;
 border:1px solid #D9DDE3;
}

.add-btn{
  background:#EFEFEF !important;
  color:#555 !important;
  border:1px solid #D8DDE5 !important;
  box-shadow:none !important;
}

.add-btn:hover{
  background:#E5E7EB !important;
}  

@media (max-width:768px){

  table{
    font-size:12px;
  }

  th{
    padding:8px 2px;
    font-size:11px;
    white-space:normal;
    word-break:keep-all;
  }

  td{
    padding:6px 4px;
  }

.delete-btn{
  padding:6px 10px !important;
  min-width:60px !important;
  height:36px !important;
  border-radius:10px;
  font-size:13px;
}  

@media (max-width:768px){

  .delete-btn{
    min-width:52px !important;
    height:32px !important;
    font-size:12px;
    padding:4px 8px !important;
  }

}
  
</style>
</head>
<body>

<h1>💰 EUN 월 현금 대시보드</h1>

<div class="panel">
  <h3>📅 대상 월</h3>
  <input type="month" id="month" onchange="loadMonth()">
</div>

<hr>
<div class="panel">
 <h3>📂 데이터 관리</h3>

 <div class="btn-row">
   <button onclick="backupData()">백업</button>
   <input type="file" id="restoreFile">
   <button onclick="restoreData()">복원</button>
 </div>
</div>
  
<div class="panel">
 <h3>💰 월 관리</h3>
<div class="btn-row">
   <button onclick="copyMonthlyFixed()">고정비 가져오기</button>
   <button onclick="carryOver()">잔액이월</button>
   <button onclick="saveMonth()">월 저장</button>
   <button onclick="deleteMonth()">선택월 삭제</button>
 </div>
 </div>


<h2>수입</h2>
<table id="incomeTable">
<tr><th>항목</th><th>금액</th><th></th></tr>
</table>
<button class="add-btn" onclick="addIncome()">+ 추가</button>
  
<h2>고정비</h2>
<table id="fixedTable">
<tr><th>월</th><th>결제</th><th>분류</th><th>항목</th><th>금액</th><th></th></tr>
</table>
<button class="add-btn" onclick="addFixed()">+ 추가</button>

<h2>투자/저축</h2>
<table id="investTable">
<tr><th>항목</th><th>금액</th><th></th></tr>
</table>
<button class="add-btn" onclick="addInvest()">+ 추가</button>

<h2>카드 청구액</h2>
<table id="cardTable">
<tr><th>카드</th><th>금액</th><th></th></tr>
</table>
<button class="add-btn" onclick="addCard()">+ 추가</button>

<h2>현금지출</h2>
<table id="cashTable">
<tr><th>항목</th><th>금액</th><th></th></tr>
</table>
<button class="add-btn" onclick="addCash()">+ 추가</button>
  
<h2>요약</h2>
<div class="summary-grid">
<div class="box sum">총 수입: <span id="incomeSum">0</span>원</div>
<div class="box sum">현금 고정비: <span id="fixedSum">0</span>원</div>
<div class="box sum">카드 고정비: <span id="cardFixedSum">0</span>원</div>
<div class="box sum">카드 생활비: <span id="livingSum">0</span>원</div>
<div class="box sum">투자/저축: <span id="investSum">0</span>원</div>
<div class="box sum">현금지출: <span id="cashSpendSum">0</span>원</div>
<div class="box sum">여유자금: <span id="remainSum">0</span>원</div>
</div>
 
<script>
const cats=['보험','대출','렌탈','반려견','양가부모님','OTT','투자','저축','기타'];
let saveTimer;

function num(v){return Number(String(v||'').replace(/,/g,''))||0;}
function fmt(v){return Number(v||0).toLocaleString();}

function autoSave(){
 clearTimeout(saveTimer);
 saveTimer=setTimeout(()=>saveMonth(true),800);
}

function moneyInput(v=''){
 return '<input value="'+(v?fmt(v):'')+'" oninput="formatMoney(this);calc();autoSave()">';
}

function formatMoney(el){
 let n=String(el.value).replace(/[^\d]/g,'');
 el.value=n?Number(n).toLocaleString():'';
}

function addIncome(a='',b=''){
 let r=incomeTable.insertRow(-1);
 r.innerHTML='<td><input value="'+a+'" oninput="autoSave()"></td><td>'+moneyInput(b)+'</td><td><button class="delete-btn" onclick="removeRow(this)">삭제</button></td>';
}

function addInvest(a='',b=''){
 let r=investTable.insertRow(-1);
 r.innerHTML='<td><input value="'+a+'" oninput="autoSave()"></td><td>'+moneyInput(b)+'</td><td><button class="delete-btn" onclick="removeRow(this)">삭제</button></td>';
}

function addCard(a='',b=''){
 let r=cardTable.insertRow(-1);
 r.innerHTML='<td><input value="'+a+'" oninput="autoSave()"></td><td>'+moneyInput(b)+'</td><td><button class="delete-btn" onclick="removeRow(this)">삭제</button></td>';
}

function addCash(a='',b=''){
 let r=cashTable.insertRow(-1);
 r.innerHTML='<td><input value="'+a+'" oninput="autoSave()"></td><td>'+moneyInput(b)+'</td><td><button class="delete-btn" onclick="removeRow(this)">삭제</button></td>';
}

function addFixed(monthly=true,pay='현금',cat='보험',detail='',amt=''){
 let opts=cats.map(x=>`<option ${x===cat?'selected':''}>${x}</option>`).join('');
 let r=fixedTable.insertRow(-1);
 r.innerHTML=`
<td><input type="checkbox" ${monthly?'checked':''} onchange="autoSave()"></td>
<td><select onchange="autoSave()"><option ${pay==='현금'?'selected':''}>현금</option><option ${pay==='카드'?'selected':''}>카드</option></select></td>
<td><select onchange="autoSave()">${opts}</select></td>
<td><input value="${detail}" oninput="autoSave()"></td>
<td>${moneyInput(amt)}</td>
<td><button class="delete-btn" onclick="removeRow(this)">삭제</button></td>`;
}

function removeRow(btn){
 btn.closest('tr').remove();
 calc();
 autoSave();
}

function carryOver(){

 let remain = num(document.getElementById('remainSum').textContent);

 if(remain<=0){
   alert('이월할 잔액이 없습니다.');
   return;
 }

 let current = month.value;

 if(!current){
   alert('월을 선택하세요.');
   return;
 }

 let d = new Date(current + '-01');
 d.setMonth(d.getMonth()+1);

 let nextMonth =
   d.getFullYear() + '-' +
   String(d.getMonth()+1).padStart(2,'0');

 let raw = localStorage.getItem('EUN31_'+nextMonth);

 let data = raw ? JSON.parse(raw) : {
   income:[],
   invest:[],
   card:[],
   cash:[],
   fixed:[]
 };

 let idx = data.income.findIndex(x=>x[0]==='전월 이월금');

 if(idx>=0){
   data.income[idx][1]=remain;
 }else{
   data.income.push(['전월 이월금',remain]);
 }

 localStorage.setItem(
   'EUN31_'+nextMonth,
   JSON.stringify(data)
 );

 alert(
   fmt(remain)+'원이 '+
   nextMonth+
   ' 수입으로 이월되었습니다.'
 );
} 

function copyMonthlyFixed(){

let current = month.value;

if(!current){
  alert('월을 선택하세요.');
  return;
}

let d = new Date(current + '-01');
d.setMonth(d.getMonth()-1);

let prevMonth =
  d.getFullYear() + '-' +
  String(d.getMonth()+1).padStart(2,'0');

let raw = localStorage.getItem('EUN31_'+prevMonth);

if(!raw){
  alert(prevMonth+' 데이터가 없습니다.');
  return;
}

let last = JSON.parse(raw);

 (last.fixed||[])
   .filter(f=>f.monthly)
   .forEach(f=>{

     let exists = [...fixedTable.rows]
       .slice(1)
       .some(r =>
         r.cells[3].querySelector('input').value === f.detail
       );

     if(!exists){
       addFixed(
         true,
         f.pay,
         f.cat,
         f.detail,
         f.amt
       );
     }

   });

 calc();
 autoSave();

 alert('매월 고정비를 가져왔습니다.');
}
 
function calc(){
 let income=0,invest=0,cashFixed=0,cashSpend=0,cardTotal=0,cardFixed=0;

 [...incomeTable.rows].slice(1).forEach(r=>income+=num(r.cells[1].querySelector('input').value));
 [...investTable.rows].slice(1).forEach(r=>invest+=num(r.cells[1].querySelector('input').value));
 [...cashTable.rows].slice(1).forEach(r=>cashSpend+=num(r.cells[1].querySelector('input').value));
 [...cardTable.rows].slice(1).forEach(r=>cardTotal+=num(r.cells[1].querySelector('input').value));

 [...fixedTable.rows].slice(1).forEach(r=>{
   let amt=num(r.cells[4].querySelector('input').value);
   if(r.cells[1].querySelector('select').value==='카드'){
      cardFixed+=amt;
   }else{
      cashFixed+=amt;
   }
 });

 let living=cardTotal-cardFixed;
 let remain=income-cashFixed-invest-living-cashSpend;

 incomeSum.textContent=fmt(income);
 fixedSum.textContent=fmt(cashFixed);
 cardFixedSum.textContent=fmt(cardFixed);
 livingSum.textContent=fmt(living);
 investSum.textContent=fmt(invest);
 cashSpendSum.textContent=fmt(cashSpend);
 remainSum.textContent=fmt(remain);
}

function collect(){
 return {
 income:[...[...incomeTable.rows].slice(1)].map(r=>[r.cells[0].querySelector('input').value,num(r.cells[1].querySelector('input').value)]),
 invest:[...[...investTable.rows].slice(1)].map(r=>[r.cells[0].querySelector('input').value,num(r.cells[1].querySelector('input').value)]),
 card:[...[...cardTable.rows].slice(1)].map(r=>[r.cells[0].querySelector('input').value,num(r.cells[1].querySelector('input').value)]),
 cash:[...[...cashTable.rows].slice(1)].map(r=>[r.cells[0].querySelector('input').value,num(r.cells[1].querySelector('input').value)]),
 fixed:[...[...fixedTable.rows].slice(1)].map(r=>({
 monthly:r.cells[0].querySelector('input').checked,
 pay:r.cells[1].querySelector('select').value,
 cat:r.cells[2].querySelector('select').value,
 detail:r.cells[3].querySelector('input').value,
 amt:num(r.cells[4].querySelector('input').value)
 }))
 };
}

function saveMonth(silent=false){
 let m=month.value;
 if(!m) return;
 localStorage.setItem('EUN31_'+m,JSON.stringify(collect()));
 if(!silent) alert('저장 완료');
}

function deleteMonth(){

 let m = month.value;

 if(!m){
   alert('월을 선택하세요.');
   return;
 }

 if(!confirm(m + ' 데이터를 삭제할까요?')){
   return;
 }

 localStorage.removeItem('EUN31_' + m);

 clearTable('incomeTable');
 clearTable('investTable');
 clearTable('cardTable');
 clearTable('fixedTable');
 clearTable('cashTable');

 defaultCards();
 calc();

 alert(m + ' 데이터가 삭제되었습니다.');
}

 
 
function clearTable(id){
 let t=document.getElementById(id);
 while(t.rows.length>1)t.deleteRow(1);
}

function loadMonth(){
 let m=month.value;
 clearTable('incomeTable');
 clearTable('investTable');
 clearTable('cardTable');
 clearTable('fixedTable');
 clearTable('cashTable');

 let raw=localStorage.getItem('EUN31_'+m);

if(!raw){
   defaultCards();
   calc();
   return;
}

 let d=JSON.parse(raw);
 d.income.forEach(x=>addIncome(x[0],x[1]));
 d.invest.forEach(x=>addInvest(x[0],x[1]));
 d.card.forEach(x=>addCard(x[0],x[1]));
 (d.cash||[]).forEach(x=>addCash(x[0],x[1]));
 d.fixed.forEach(x=>addFixed(x.monthly,x.pay,x.cat,x.detail,x.amt));
 calc();
}

function backupData(){
 const data={};
 Object.keys(localStorage).filter(k=>k.startsWith('EUN31_')).forEach(k=>data[k]=localStorage.getItem(k));
 const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='EUN_backup.json';
 a.click();
}

function restoreData(){
 const f=restoreFile.files[0];
 if(!f) return;
 const r=new FileReader();
 r.onload=e=>{
   const data=JSON.parse(e.target.result);
   Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
  loadMonth();
  alert('복원 완료');
 };
 r.readAsText(f);
}

function defaultCards(){
 if(cardTable.rows.length>1) return;
 addCard('삼성카드',0);
 addCard('현대카드',0);
 addCard('신한카드',0);
 addCard('KB국민카드',0);
 addCard('우리카드',0);
}

month.value=new Date().toISOString().slice(0,7);
loadMonth();
</script>
</body>
</html>
